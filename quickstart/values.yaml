# Quickstart values for a self-contained Slurm cluster.
#
# Everything runs inside Kubernetes as pods: no shared filesystem, no
# cloud-specific autoscaler, no external secrets. The Slurm auth keys are
# generated by the chart. This is the fastest way to a working cluster you
# can run `sinfo` / `srun` against — on kind, minikube, or a real EKS cluster.
#
# To grow into the production topology (spot autoscaling via Karpenter, an EFS
# shared filesystem, and the workload catalog), layer the charts in ../charts
# on top — see the repo README.

slurmKey:
  create: true   # chart generates the Slurm auth key
jwtKey:
  create: true   # chart generates the JWT signing key

controller:
  persistence:
    enabled: false   # ephemeral save-state; fine for a demo/dev cluster

# Slurm accounting (slurmdbd + MariaDB) adds moving parts and storage.
# Off for the quickstart; flip to true once you want sacct/associations.
accounting:
  enabled: false

restapi:
  replicas: 1

# Login pod — `kubectl exec` into it to use the Slurm CLIs as a user.
loginsets:
  slinky:
    replicas: 1

# Worker nodes (slurmd) run as pods. Bump replicas to add compute.
# On single-node kind only one may schedule; on EKS with N nodes you get N.
nodesets:
  slinky:
    replicas: 2
