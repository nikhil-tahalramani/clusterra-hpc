apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tenant-cluster-secrets
  namespace: argocd
  annotations:
    # After cluster-api (wave 2): plugin generator below calls it. Same
    # generator as the `clusters` AppSet (wave 3); this AppSet renders the
    # ArgoCD cluster Secret via ESO so wave-5 workloads can target it.
    argocd.argoproj.io/sync-wave: "3"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - plugin:
        configMapRef:
          name: argocd-tenants-plugin
        requeueAfterSeconds: 30
  template:
    metadata:
      name: 'tenant-{{`{{.cluster_id}}`}}-cluster-secret'
      namespace: argocd
      labels:
        clusterra.io/cluster: '{{`{{.cluster_id}}`}}'
    spec:
      project: default
      source:
        repoURL: {{ .Values.repoURL | squote }}
        targetRevision: {{ .Values.targetRevision }}
        path: core/fleet/charts/tenant-cluster-secret
        helm:
          parameters:
            - name: clusterId
              value: '{{`{{.cluster_id}}`}}'
      destination:
        server: 'https://kubernetes.default.svc'
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
