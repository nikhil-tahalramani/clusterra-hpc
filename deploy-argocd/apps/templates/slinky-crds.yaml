apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: slinky-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    chart: slurm-operator-crds
    repoURL: ghcr.io/slinkyproject/charts
    targetRevision: 1.1.0
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: slinky
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
