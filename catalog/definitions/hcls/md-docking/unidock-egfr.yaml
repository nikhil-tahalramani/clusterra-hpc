id: unidock-egfr
name: Uni-Dock — EGFR kinase (PDB 1IEP)
description: |
  Uni-Dock GPU virtual screening pinned to the EGFR kinase active site
  (PDB 1IEP ATP binding pocket, erlotinib co-crystal).

  Default box: center (22.5, 4.0, 50.5), size 25×25×25 Å — covers the
  hinge region + selectivity pocket used by erlotinib/gefitinib/osimertinib.
  Pre-staged receptor at /mnt/efs/bench/drug-disco/egfr-receptor.pdbqt and
  1000-compound EGFR inhibitor library at /mnt/efs/bench/drug-disco/zinc-1k/
  are created by drug-disco-bench-prep.

  Benchmark role (drug-disco-bench step 2): screen 1000 EGFR-relevant
  compounds in ~8 min on a single A10G (g5.xlarge, ~$0.05 spot).
vertical: hcls
category: md-docking
workload_group: md-docking
modality: form
tools: [Uni-Dock]
ready: true
kind: batch

runtime:
  kind: docker_image
  image: docker://dptechnology/unidock:1.1.3

sbatch: |
  #SBATCH --partition=gpu
  #SBATCH --cpus-per-task=8
  #SBATCH --mem=32G
  #SBATCH --time=1:00:00
  #SBATCH --nodes=1
  #SBATCH --gres=gpu:l40s:1
inputs:
  - key: receptor_pdbqt
    role: pdbqt
    required: false
    default: /mnt/efs/bench/drug-disco/egfr-receptor.pdbqt
    description: EGFR receptor PDBQT (PDB 1IEP protein atoms). Staged by drug-disco-bench-prep.
  - key: ligand_dir
    role: generic_path
    required: false
    default: /mnt/efs/bench/drug-disco/zinc-1k/ligands
    description: |
      Directory of 1000 EGFR inhibitor PDBQT files. Staged by drug-disco-bench-prep.

parameters:
  - key: center_x
    label: Search box center X (Å)
    widget: number
    default: 22.5
  - key: center_y
    label: Search box center Y (Å)
    widget: number
    default: 4.0
  - key: center_z
    label: Search box center Z (Å)
    widget: number
    default: 50.5
  - key: size_x
    label: Search box size X (Å)
    widget: number
    default: 25.0
  - key: size_y
    label: Search box size Y (Å)
    widget: number
    default: 25.0
  - key: size_z
    label: Search box size Z (Å)
    widget: number
    default: 25.0
  - key: search_mode
    label: Search mode
    widget: enum
    options: [fast, balance, detail]
    default: balance
  - key: scoring
    label: Scoring function
    widget: enum
    options: [vina, vinardo, ad4]
    default: vina

outputs:
  dir: /mnt/efs/{{.ctx.user_email}}/unidock-egfr-{{.ctx.run_id}}
  artifacts:
    - key: poses
      path: "{{.outputs.dir}}"
      role: primary_output
      description: Per-ligand <name>_out.pdbqt with REMARK VINA RESULT scores.

script: |
  #!/bin/bash
  set -euo pipefail

  RECEPTOR={{.inputs.receptor_pdbqt | quote}}
  LIGAND_DIR={{.inputs.ligand_dir | quote}}
  OUTPUT_DIR={{.outputs.dir | quote}}

  [ -r "$RECEPTOR" ] || { echo "receptor not readable: $RECEPTOR" >&2; exit 1; }
  [ -d "$LIGAND_DIR" ] || { echo "ligand_dir not a directory: $LIGAND_DIR" >&2; exit 1; }
  shopt -s nullglob
  LIGANDS=( "$LIGAND_DIR"/*.pdbqt )
  shopt -u nullglob
  [ "${#LIGANDS[@]}" -gt 0 ] || { echo "no .pdbqt ligands in $LIGAND_DIR" >&2; exit 1; }
  mkdir -p "$OUTPUT_DIR"
  echo "unidock-egfr: ${#LIGANDS[@]} ligands -> $OUTPUT_DIR"

  exec apptainer exec --nv --bind "$TMPDIR:$TMPDIR" \
    "{{.runtime.image}}" \
    unidock \
      --receptor "$RECEPTOR" \
      --gpu_batch "${LIGANDS[@]}" \
      --center_x {{.params.center_x}} \
      --center_y {{.params.center_y}} \
      --center_z {{.params.center_z}} \
      --size_x {{.params.size_x}} \
      --size_y {{.params.size_y}} \
      --size_z {{.params.size_z}} \
      --search_mode {{.params.search_mode | quote}} \
      --scoring {{.params.scoring | quote}} \
      --dir "$OUTPUT_DIR"
