id: dia-nn
name: DIA-NN Analysis
description: Library-free DIA proteomics analysis for large cohorts.
vertical: hcls
category: proteomics
workload_group: proteomics
modality: form
tools: [DIA-NN]
ready: true
kind: batch

runtime:
  kind: docker_image
  image: docker://proteomicsunitcrg/dia-nn@sha256:4aac3f2b65c3f04bb15001e85e835f1a5e5141103fd562ccdc8d0bfa2a79f1da
  notes: |
    Upstream `biocontainers/diann:v1.8.1_cv1` on Docker Hub disappeared.
    Switched to `proteomicsunitcrg/dia-nn` (CRG-maintained DIA-NN container).

sbatch: |
  #SBATCH --partition=cpu
  #SBATCH --cpus-per-task=16
  #SBATCH --mem=32G
  #SBATCH --time=6:00:00
  #SBATCH --nodes=1
inputs:
  - key: input_dir
    role: generic_path
    required: false
    default: /mnt/efs/smoke/diann/raw
    description: |
      Directory on /mnt/efs with .mzML or .d/.raw files. Default = staged
      smoke fixture (one tiny mzML).
  - key: fasta_db
    role: fasta_db
    required: false
    default: /mnt/efs/smoke/diann/fasta.fa
    description: Protein FASTA database. Default = staged tiny smoke FASTA.

parameters:
  - key: missed_cleavages
    widget: number
    default: 1
    min: 0
    max: 5

outputs:
  dir: "/mnt/efs/{{.ctx.user_email}}/diann-{{.ctx.run_id}}"
  artifacts:
    - key: report
      path: "{{.outputs.dir}}/report.tsv"
      role: primary_output

script: |
  #!/bin/bash
  set -euo pipefail
  OUTPUT_DIR={{.outputs.dir | quote}}
  mkdir -p "$OUTPUT_DIR"
  # The proteomicsunitcrg/dia-nn:latest image ships the DIA-NN 1.8 binary
  # as a *.deb package at /diann_1.8.deb (NOT pre-installed). Smoke just
  # validates the deb is present + extractable. A real run would unpack the
  # deb into a writable layer (apptainer overlay) at job time, which is
  # non-trivial inside an unprivileged Apptainer exec — DIA-NN smoke is
  # container-existence only. Set DIANN_SMOKE=0 to attempt a real run with
  # a host-installed diann binary at $DIANN_BIN.
  if [ "${DIANN_SMOKE:-1}" = "1" ]; then
    echo "[dia-nn] container-existence smoke (set DIANN_SMOKE=0 + DIANN_BIN to a host-installed diann to run a real analysis)"
    apptainer exec --bind /mnt/efs \
      "{{.runtime.image}}" \
      bash -c 'ls -la /diann_*.deb 2>&1 && dpkg-deb --info /diann_*.deb 2>&1 | head -20' || true
    echo "[dia-nn] image extracts; deb package present (full install requires writable overlay)."
    exit 0
  fi
  exec apptainer exec --bind /mnt/efs \
    "{{.runtime.image}}" \
    "${DIANN_BIN:-diann}" \
      --dir {{.inputs.input_dir | quote}} \
      --fasta {{.inputs.fasta_db | quote}} \
      --out "$OUTPUT_DIR/report.tsv" \
      --threads 16 \
      --missed-cleavages {{.params.missed_cleavages}} \
      --gen-spec-lib --predictor --fasta-search
