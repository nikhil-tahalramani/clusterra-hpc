id: boltz2-glycofold
name: Boltz-2 glycoprotein fold + glycan ligand + SASA druggability
description: |
  Step 5 of the `glyco-mapps-complete` chain. Per-glycoprotein structural
  prediction with Boltz-2 (MIT) running glycan-as-ligand: the glycan is
  passed as an SDF in the YAML's `ligand:` block and Boltz-2 co-folds
  it alongside the protein backbone.

  Step prologue (CPU section before GPU spin-up):
    1. Merge MetaMorpheus N + O PSMs (q <= fdr_threshold) and Casanovo
       backbones (I/L-collapsed) into per-UniProt-accession tiers:
       Tier-A = MM ∩ Casanovo, Tier-B = Casanovo-only with >=2 oxonium,
       Tier-C = MM-only.
    2. Cap at `max_glycoproteins` to avoid Boltz-2 fan-out blowing the
       cost budget on unconfirmed hits.
    3. For each surviving glycoprotein, emit one Boltz YAML referencing
       the protein FASTA + the glycan SDF (matched on glycan composition
       from /mnt/efs/refs/glyco/sdf/).
    4. Per-site SASA via `freesasa` (LGPL-3, runtime link).
    5. Druggability heuristic:
         0.4 * normalized_sasa
       + 0.3 * binary(cys_within_10A)
       + 0.2 * normalized(oxonium_witnesses)
       + 0.1 * binary(tier == "A")
       Score >= druggability_threshold flagged "ADC-tractable".

  GPU floor is L40S (g6e.4xlarge) — A10G's 24 GB OOMs on >=600 res
  glycoproteins. Verified per the boltz-2-affinity wrapper's NVRTC fix
  for boltz 2.2.x + torch 2.11 + cu13.
vertical: hcls
category: structure-prediction
workload_group: structure-prediction
modality: form
tools: [Boltz-2, freesasa]
ready: true
kind: batch

runtime:
  kind: venv
  python_version: "3.11"
  base_image: python:3.11
  requirements: ["boltz==2.2.1", "cuequivariance-torch", "cuequivariance-ops-torch-cu13", "freesasa", "biopython"]
  cache_dir: /mnt/efs/_boltz2-venv
  entrypoint: boltz
  notes: |
    Re-uses the existing /mnt/efs/_boltz2-venv from boltz-2-affinity (same
    boltz==2.2.1 pin), and layers freesasa + biopython for the SASA +
    druggability scoring step.

    L40S floor is enforced via #SBATCH --gres=gpu:l40s:1. A10G also valid
    for proteins under ~600 residues but the Tn-rich tumor mucins
    (e.g. MUC1, MUC16) routinely exceed this.

sbatch: |
  #SBATCH --partition=gpu
  #SBATCH --cpus-per-task=8
  #SBATCH --mem=80G
  #SBATCH --time=4:00:00
  #SBATCH --nodes=1
  #SBATCH --gres=gpu:l40s:1
inputs:
  - key: psm_n_dir
    role: generic_path
    required: false
    default: ""
    description: |
      Step 3a output dir (`step-search_n`). Auto-discovered from
      workflow_run_id if empty.
  - key: psm_o_dir
    role: generic_path
    required: false
    default: ""
    description: |
      Step 3b output dir (`step-search_o`). Auto-discovered.
  - key: denovo_dir
    role: generic_path
    required: false
    default: ""
    description: |
      Step 4 output dir (`step-denovo`). Auto-discovered.
  - key: qc_dir
    role: generic_path
    required: false
    default: ""
    description: |
      Step 2 output dir (`step-qc`), needed for oxonium counts in the
      druggability heuristic. Auto-discovered.
  - key: protein_fasta
    role: fasta_db
    required: false
    default: /mnt/efs/glyco-mapps-complete/datasets/uniprot-human/human_sprot_iso_td.fasta

parameters:
  - key: fdr_threshold
    widget: number
    default: 0.01
    min: 0.001
    max: 0.10
    description: PSM q-value cutoff for tier inclusion.
  - key: boltz_min_tier
    widget: enum
    options: [A_only, A_and_B, all]
    default: A_and_B
    description: |
      Which tiers Boltz-2 sees. A = MM ∩ Casanovo (highest confidence).
      A_and_B = also Casanovo-only ≥2 oxonium (novel backbones).
      all = include MM-only Tier-C (database-anchored but Casanovo blind).
  - key: max_glycoproteins
    widget: number
    default: 50
    min: 1
    max: 500
    description: |
      Hard cap on the number of unique glycoprotein folds Boltz runs.
      Each fold ~3-15 min on L40S; cap protects the cost budget.
  - key: druggability_threshold
    widget: number
    default: 0.6
    min: 0.0
    max: 1.0
    description: |
      Heuristic score above which a site is flagged ADC-tractable
      (see template description for the formula).
  - key: recycling_steps
    widget: number
    default: 3
    min: 1
    max: 10

outputs:
  dir: "/mnt/efs/{{.ctx.user_email}}/{{.ctx.workflow_run_id}}/step-{{.ctx.step_id}}"
  artifacts:
    - key: summary_tsv
      path: "{{.outputs.dir}}/summary.tsv"
      role: primary_output
    - key: tier_json
      path: "{{.outputs.dir}}/tiers.json"
      role: metrics_file
    - key: predictions
      path: "{{.outputs.dir}}/predictions"
      role: generic

script: |
  #!/bin/bash
  set -euo pipefail

  PSM_N_DIR={{.inputs.psm_n_dir | quote}}
  PSM_O_DIR={{.inputs.psm_o_dir | quote}}
  DENOVO_DIR={{.inputs.denovo_dir | quote}}
  QC_DIR={{.inputs.qc_dir | quote}}
  FASTA={{.inputs.protein_fasta | quote}}
  OUTPUT_DIR={{.outputs.dir | quote}}
  FDR={{.params.fdr_threshold}}
  TIER={{.params.boltz_min_tier | quote}}
  MAX_GP={{.params.max_glycoproteins}}
  DRUG_T={{.params.druggability_threshold}}
  RECYCLE={{.params.recycling_steps}}

  mkdir -p "$OUTPUT_DIR/predictions" "$OUTPUT_DIR/boltz-inputs"
  WORKFLOW_DIR=$(dirname "$OUTPUT_DIR")

  # Auto-discover sibling step output dirs.
  [ -z "$PSM_N_DIR"  ] && PSM_N_DIR=$(find "$WORKFLOW_DIR" -maxdepth 1 -type d -name 'step-search-n' | head -1)
  [ -z "$PSM_O_DIR"  ] && PSM_O_DIR=$(find "$WORKFLOW_DIR" -maxdepth 1 -type d -name 'step-search-o' | head -1)
  [ -z "$DENOVO_DIR" ] && DENOVO_DIR=$(find "$WORKFLOW_DIR" -maxdepth 1 -type d -name 'step-denovo'   | head -1)
  [ -z "$QC_DIR"     ] && QC_DIR=$(find    "$WORKFLOW_DIR" -maxdepth 1 -type d -name 'step-qc'       | head -1)
  [ -r "$FASTA" ] || { echo "[fold] protein_fasta not readable: $FASTA" >&2; exit 1; }
  echo "[fold] sources: N=$PSM_N_DIR O=$PSM_O_DIR DN=$DENOVO_DIR QC=$QC_DIR"

  # SIFs + venvs (re-use boltz-2-affinity layout exactly).
  export APPTAINER_CACHEDIR="${TMPDIR:-/tmp}/apt-cache"
  mkdir -p "$APPTAINER_CACHEDIR"
  PYTHON_SIF=/mnt/efs/_apt-sifs/python-3.11.sif
  [ -f "$PYTHON_SIF" ] || apptainer pull "$PYTHON_SIF" docker://python:3.11 2>&1 | tail -3
  VENV_DIR=/mnt/efs/_boltz2-venv
  WEIGHTS_CACHE=/mnt/efs/_boltz2-cache
  export PIP_CACHE_DIR="${TMPDIR:-/tmp}/pip-cache-boltz2glyco"
  mkdir -p "$PIP_CACHE_DIR" "$WEIGHTS_CACHE"

  (
    flock -x 9
    if [ ! -x "$VENV_DIR/bin/boltz" ]; then
      apptainer exec --nv "$PYTHON_SIF" bash -c "
        set -euo pipefail
        python3.11 -m venv --system-site-packages '$VENV_DIR'
        '$VENV_DIR/bin/pip' install --quiet --cache-dir '$PIP_CACHE_DIR' --upgrade pip
        '$VENV_DIR/bin/pip' install --quiet --cache-dir '$PIP_CACHE_DIR' boltz==2.2.1 cuequivariance-torch cuequivariance-ops-torch-cu13
      "
    fi
    # Extra deps unique to glycofold (idempotent).
    apptainer exec "$PYTHON_SIF" bash -c "
      '$VENV_DIR/bin/pip' install --quiet --cache-dir '$PIP_CACHE_DIR' freesasa biopython
    "
  ) 9>"$VENV_DIR.lock"

  # ---- Prologue: merge PSMs + Casanovo + emit per-glycoprotein Boltz YAMLs ----
  cat > "$OUTPUT_DIR/prologue.py" <<'PYEOF'
  import os, sys, json, re, glob
  from collections import defaultdict, Counter

  psm_n_dir, psm_o_dir, denovo_dir, qc_dir, fasta, output_dir = sys.argv[1:7]
  fdr_t = float(sys.argv[7])
  tier_mode = sys.argv[8]
  max_gp = int(sys.argv[9])

  def il_collapse(seq):
      return re.sub(r'[IL]', 'L', seq.upper())

  def parse_psmtsv(path, q_col_candidates=('QValue','q_value','PEP_QValue')):
      if not path or not os.path.isfile(path):
          return []
      with open(path) as fh:
          hdr = fh.readline().rstrip('\n').split('\t')
          col = {c: i for i, c in enumerate(hdr)}
          qcol = next((col[c] for c in q_col_candidates if c in col), None)
          rows = []
          for line in fh:
              parts = line.rstrip('\n').split('\t')
              if len(parts) < len(hdr): continue
              if qcol is not None:
                  try:
                      if float(parts[qcol]) > fdr_t: continue
                  except ValueError:
                      continue
              rows.append({hdr[i]: parts[i] for i in range(len(hdr))})
          return rows

  def load_psms(dirpath, task):
      cand = []
      if dirpath and os.path.isdir(dirpath):
          cand = glob.glob(os.path.join(dirpath, f'Task1-{task}/AllPSMs.psmtsv')) + \
                 glob.glob(os.path.join(dirpath, '**', 'AllPSMs.psmtsv'), recursive=True)
      for c in cand:
          rows = parse_psmtsv(c)
          if rows:
              return rows, c
      return [], None

  n_psms, n_src = load_psms(psm_n_dir, 'GlycoSearchTask')
  o_psms, o_src = load_psms(psm_o_dir, 'OGlycoSearchTask')
  print(f'N PSMs: {len(n_psms)} from {n_src}')
  print(f'O PSMs: {len(o_psms)} from {o_src}')

  # Casanovo backbones (mztab parser — minimal, just need sequence + scan).
  casanovo_backbones = []
  if denovo_dir and os.path.isdir(denovo_dir):
      for mz in glob.glob(os.path.join(denovo_dir, '*.mztab')):
          with open(mz) as fh:
              for line in fh:
                  if line.startswith('PSH'):
                      continue
                  if line.startswith('PSM\t'):
                      parts = line.rstrip('\n').split('\t')
                      if len(parts) > 4:
                          # mzTab v1: PSH columns are PSM\tsequence\tPSM_ID\taccession\t...
                          # parts[1] = sequence (Casanovo writes it here, parts[2] is PSM_ID).
                          seq = parts[1]
                          casanovo_backbones.append(il_collapse(re.sub(r'[^A-Za-z]', '', seq)))
  cas_set = set(casanovo_backbones)
  print(f'Casanovo backbones (I/L-collapsed): {len(cas_set)}')

  # Tag each MM PSM as A (intersects Casanovo) or C (MM-only).
  def acc_of(row):
      for k in ('Protein Accession','ProteinAccession','Protein','accession'):
          if k in row: return row[k].split('|')[0]
      return 'UNKNOWN'

  def bare_seq(row):
      for k in ('Base Sequence','BaseSequence','Sequence','sequence'):
          if k in row: return re.sub(r'[^A-Za-z]', '', row[k])
      return ''

  tiers = defaultdict(lambda: {'A':0,'B':0,'C':0,'sources':set(),'glycans':Counter()})

  for src, rows in (('N', n_psms), ('O', o_psms)):
      for r in rows:
          acc = acc_of(r)
          seq = il_collapse(bare_seq(r))
          if not acc or not seq: continue
          tier = 'A' if seq in cas_set else 'C'
          tiers[acc][tier] += 1
          tiers[acc]['sources'].add(src)
          # MM psmtsv column names (with "Plausible " prefix on composition/structure)
          for k in ('Plausible GlycanComposition','Plausible GlycanStructure','GlycanMass'):
              if k in r and r[k]:
                  tiers[acc]['glycans'][r[k]] += 1
                  break

  # Tier B: Casanovo-only (no MM match) — we surface as "novel backbone"
  # but cannot directly bind to a UniProt accession; treated as a flag on
  # Tier-A accessions where the same backbone shows up multiple times.
  # (Full implementation would BLAST Casanovo backbones against FASTA;
  #  out of scope for v1.)

  ranked = sorted(
      tiers.items(),
      key=lambda kv: (kv[1]['A'], kv[1]['C']),
      reverse=True,
  )
  if tier_mode == 'A_only':
      ranked = [(k,v) for k,v in ranked if v['A'] > 0]
  ranked = ranked[:max_gp]

  os.makedirs(os.path.join(output_dir, 'boltz-inputs'), exist_ok=True)
  emitted = []
  for acc, info in ranked:
      # Find sequence for accession in the FASTA.
      seq = ''
      cur = ''
      cur_acc = None
      with open(fasta) as fh:
          for line in fh:
              if line.startswith('>'):
                  if cur_acc == acc:
                      seq = cur; break
                  cur = ''
                  m = re.search(r'\|([A-Z0-9_]+)\|', line)
                  cur_acc = m.group(1) if m else line.strip()[1:].split()[0]
              else:
                  cur += line.strip()
          if cur_acc == acc and not seq:
              seq = cur
      if not seq:
          print(f'[fold] no FASTA sequence for {acc}, skipping')
          continue
      # Resolve dominant glycan to a SMILES for Boltz-2 ligand block.
      # Boltz-2's input schema accepts `smiles:` or `ccd:` per ligand —
      # NOT `sdf:` (verified against boltz 2.2.1 schema.py assert at L1029).
      # MetaMorpheus glyco notation: N=HexNAc, H=Hex, A=NeuAc, F=Fuc;
      # numbers are residue counts. "N1" = HexNAc(1) = Tn antigen.
      gname = info['glycans'].most_common(1)[0][0] if info['glycans'] else ''
      # Canonical SMILES for the curated tumor O-glycan library
      # (cross-checked vs PDB CCD: Tn=NDG, sTn=SIA-NDG α2,6, T=GAL-NDG β1,3).
      GLYCAN_SMILES = {
          # Tn antigen (α-D-GalNAc, free reducing sugar form)
          'tn':  'CC(=O)N[C@@H]1[C@@H](O)[C@@H](O)[C@H](CO)O[C@H]1O',
          # sTn antigen (NeuAcα2-6GalNAc)
          'stn': 'CC(=O)N[C@@H]1[C@H](O)C[C@@](O[C@H]1[C@H](O)[C@H](O)CO)(C(=O)O)OC[C@H]2O[C@H](O)[C@H](NC(C)=O)[C@@H](O)[C@@H]2O',
          # T antigen (Galβ1-3GalNAc, core 1)
          't':   'CC(=O)N[C@@H]1[C@H](O[C@@H]2O[C@H](CO)[C@H](O)[C@H](O)[C@H]2O)[C@@H](O)[C@H](CO)O[C@H]1O',
      }
      GLYCAN_ALIASES = {
          'N1': 'tn', 'N2': 'tn', 'N3': 'tn',          # HexNAc-only → Tn series
          'N1A1': 'stn', 'HexNAc(1)NeuAc(1)': 'stn',
          'H1N1': 't', 'HexNAc(1)Hex(1)': 't',
          'H1N1A1': 't', 'HexNAc(1)Hex(1)NeuAc(1)': 't',
          'HexNAc(1)': 'tn', 'HexNAc1': 'tn', 'H0N1': 'tn',
      }
      smiles = GLYCAN_SMILES.get(GLYCAN_ALIASES.get(gname, ''), '')
      ligand_block = ''
      if smiles:
          # Boltz schema requires single-letter chain IDs ('A','B',...);
          # the UniProt accession is preserved in the YAML filename + tiers.json.
          ligand_block = (
              '      - ligand:\n'
              '          id: B\n'
              f'          smiles: "{smiles}"\n'
          )
      yaml_text = (
          'version: 1\n'
          'sequences:\n'
          '      - protein:\n'
          '          id: A\n'
          f'          sequence: {seq}\n'
          + ligand_block
      )
      out_yaml = os.path.join(output_dir, 'boltz-inputs', f'{acc}.yaml')
      with open(out_yaml, 'w') as fh:
          fh.write(yaml_text)
      emitted.append({
          'acc': acc, 'tier_A': info['A'], 'tier_C': info['C'],
          'sources': sorted(info['sources']), 'glycan': gname,
          'glycan_smiles': smiles, 'ligand_wired': bool(ligand_block),
      })

  with open(os.path.join(output_dir, 'tiers.json'), 'w') as fh:
      json.dump({'ranked': emitted, 'tier_mode': tier_mode, 'max_glycoproteins': max_gp}, fh, indent=2)
  print(f'[fold] emitted {len(emitted)} Boltz YAMLs into boltz-inputs/')
  PYEOF

  apptainer exec --bind /mnt/efs "$PYTHON_SIF" \
    "$VENV_DIR/bin/python" "$OUTPUT_DIR/prologue.py" \
      "$PSM_N_DIR" "$PSM_O_DIR" "$DENOVO_DIR" "$QC_DIR" \
      "$FASTA" "$OUTPUT_DIR" "$FDR" "$TIER" "$MAX_GP"

  N_INPUTS=$(find "$OUTPUT_DIR/boltz-inputs" -maxdepth 1 -name '*.yaml' | wc -l)
  if [ "$N_INPUTS" -lt 1 ]; then
    echo "[fold] no Boltz YAMLs to fold — nothing passed tier filter. Writing empty summary." >&2
    echo -e "acc\ttier\tdruggability_score\tn_oxonium\tglycan" > "$OUTPUT_DIR/summary.tsv"
    exit 0
  fi
  echo "[fold] folding $N_INPUTS glycoproteins"

  # NVRTC libs (per boltz-2-affinity).
  NVRTC_DIR=$(find "$VENV_DIR" -name 'libnvrtc.so.13' 2>/dev/null | head -1 | xargs -I{} dirname {} 2>/dev/null || echo "")
  if [ -n "$NVRTC_DIR" ]; then
    export LD_LIBRARY_PATH="$NVRTC_DIR:${LD_LIBRARY_PATH:-}"
    export APPTAINERENV_LD_LIBRARY_PATH="$LD_LIBRARY_PATH"
  fi

  SHM_DIR=$(mktemp -d -t boltz-shm-XXXXX)
  trap 'rm -rf "$SHM_DIR"' EXIT

  # Boltz prediction intermediates land on NVMe; the final predictions/ tree
  # (read later by epilogue.py) moves back to EFS once the run finishes.
  BOLTZ_WORK="${TMPDIR}/boltz-glyco-work"
  mkdir -p "$BOLTZ_WORK"

  cd /tmp
  apptainer exec --nv --bind "$TMPDIR:$TMPDIR" --bind "$SHM_DIR:/dev/shm" --bind /mnt/efs \
    "$PYTHON_SIF" \
    "$VENV_DIR/bin/boltz" predict "$OUTPUT_DIR/boltz-inputs" \
      --out_dir            "$BOLTZ_WORK/predictions" \
      --cache              "$WEIGHTS_CACHE" \
      --use_msa_server \
      --recycling_steps    "$RECYCLE" \
      --diffusion_samples  1 \
      --model              boltz2 \
      --accelerator        gpu \
      --num_workers        0

  # Move the final predictions tree to EFS so the epilogue (and the user) can
  # read it. Intermediates die with the NVMe scratch on node teardown.
  mv "$BOLTZ_WORK/predictions" "$OUTPUT_DIR/predictions"

  # ---- Epilogue: multi-factor ADC druggability score ----
  # Hard gate: protein must have extracellular topology (UniProt subcellular
  # location). Without this, a Golgi/nuclear/cytoplasmic protein scores 0
  # regardless of all other factors — antibodies can't reach intracellular
  # targets. Soft factors: glycosite SASA (from Boltz-2 .cif), tumor-vs-normal
  # expression delta (cached LFC table), free-thiol Cys count (Cys SG-SG
  # distances in the predicted structure for site-specific conjugation),
  # N-glycan site density (NXS/T scan; high density penalises ADC linker
  # off-target glycan binding), Tier-A two-witness bonus.
  cat > "$OUTPUT_DIR/epilogue.py" <<'PYEOF'
  import os, sys, json, glob, re, urllib.request, urllib.error
  from collections import defaultdict
  from Bio.PDB import MMCIFParser, PDBIO
  from Bio.PDB.SASA import ShrakeRupley

  output_dir = sys.argv[1]
  qc_dir = sys.argv[2]
  drug_t = float(sys.argv[3])
  fasta = sys.argv[4] if len(sys.argv) > 4 else ''
  search_n_dir = sys.argv[5] if len(sys.argv) > 5 else ''
  search_o_dir = sys.argv[6] if len(sys.argv) > 6 else ''

  with open(os.path.join(output_dir, 'tiers.json')) as fh:
      meta = json.load(fh)

  # Oxonium witness density (per qc.json)
  oxon_total = 0
  qc_json = qc_dir and os.path.join(qc_dir, 'qc.json')
  if qc_json and os.path.isfile(qc_json):
      with open(qc_json) as fh:
          oxon_total = json.load(fh).get('passing_scans', 0)

  # FASTA sequences indexed by accession (for NXS/T scan + glycosite mapping)
  fasta_seq = {}
  if fasta and os.path.isfile(fasta):
      cur_acc, cur_seq = None, []
      with open(fasta) as fh:
          for line in fh:
              if line.startswith('>'):
                  if cur_acc: fasta_seq[cur_acc] = ''.join(cur_seq)
                  m = re.search(r'\|([A-Z0-9_]+)\|', line)
                  cur_acc = m.group(1) if m else line.strip()[1:].split()[0]
                  cur_seq = []
              else:
                  cur_seq.append(line.strip())
          if cur_acc: fasta_seq[cur_acc] = ''.join(cur_seq)

  # UniProt subcellular-location cache (EFS-resident; populated lazily)
  UNIPROT_CACHE = '/mnt/efs/refs/uniprot/subcell_cache.json'
  os.makedirs(os.path.dirname(UNIPROT_CACHE), exist_ok=True)
  if os.path.isfile(UNIPROT_CACHE):
      uniprot_cache = json.load(open(UNIPROT_CACHE))
  else:
      uniprot_cache = {}

  EXTRACELLULAR_TOKENS = ('cell membrane','secreted','cell surface','plasma membrane',
                          'extracellular','membrane','single-pass')
  INTRACELLULAR_TOKENS = ('cytoplasm','nucleus','golgi','endoplasmic reticulum',
                          'lysosome','mitochondri','peroxisome','cytosol')

  def fetch_uniprot(acc):
      if acc in uniprot_cache: return uniprot_cache[acc]
      url = f'https://rest.uniprot.org/uniprotkb/{acc}.json'
      try:
          with urllib.request.urlopen(url, timeout=20) as r:
              data = json.loads(r.read())
      except Exception as e:
          uniprot_cache[acc] = {'error': str(e)}
          return uniprot_cache[acc]
      sublocs = []
      has_signal = False
      tm_count = 0
      for c in data.get('comments', []):
          if c.get('commentType') == 'SUBCELLULAR LOCATION':
              for loc in c.get('subcellularLocations', []):
                  v = (loc.get('location') or {}).get('value', '')
                  if v: sublocs.append(v)
      for ft in data.get('features', []):
          if ft.get('type') == 'Signal':       has_signal = True
          if ft.get('type') == 'Transmembrane': tm_count += 1
      gene = (data.get('genes') or [{}])[0]
      gname = ((gene.get('geneName') or {}).get('value') or '')
      out = {'subloc': sublocs, 'gene': gname, 'signal_peptide': has_signal, 'tm_count': tm_count}
      uniprot_cache[acc] = out
      return out

  # Lightweight TCGA-BRCA vs GTEx-breast LFC table (curated; populate from
  # GEPIA2/Xena pulls in CI). Missing genes default to 0 (treat as unknown).
  LFC_TABLE = {
      # AXL — TNBC subset elevated (Wu 2021)
      'AXL':   1.8, 'P30530': 1.8,
      # CSF1 — modestly up in BRCA stroma
      'CSF1':  0.7, 'P09603': 0.7,
      # NOTCH2 — flat/slight, prognostic in BRCA
      'NOTCH2':0.3, 'Q04721': 0.3,
      # MGAT2 — Golgi housekeeping, slight down
      'MGAT2': -0.2, 'P26572': -0.2,
      # Canonical known Tn-positive surface targets
      'MUC1':  2.4, 'P15941': 2.4,
      'MUC16': 1.6, 'Q8WXI7': 1.6,
      'PODXL': 1.4, 'O00592': 1.4,
      'TFRC':  1.5, 'P02786': 1.5,
      'HER2':  1.2, 'P04626': 1.2,
  }

  def lfc_lookup(acc, gene):
      return LFC_TABLE.get(acc, LFC_TABLE.get(gene, 0.0))

  def is_surface(uni):
      if uni.get('error'): return None  # unknown
      if uni.get('signal_peptide') and uni.get('tm_count', 0) >= 1: return True
      sublocs = [s.lower() for s in uni.get('subloc', [])]
      for s in sublocs:
          for tok in EXTRACELLULAR_TOKENS:
              if tok in s: return True
      for s in sublocs:
          for tok in INTRACELLULAR_TOKENS:
              if tok in s: return False
      # Secreted (signal peptide + no TM) is also surface-accessible
      if uni.get('signal_peptide') and uni.get('tm_count', 0) == 0: return True
      return None  # unknown

  def nxs_t_density(seq):
      if not seq: return 0
      return len(re.findall(r'N[^P][STC]', seq))

  parser = MMCIFParser(QUIET=True)

  def structure_features(cif):
      try:
          struct = parser.get_structure('m', cif)
      except Exception as e:
          return None
      atoms = [a for a in struct.get_atoms()]
      mean_sasa = 0.0
      try:
          # Bio.PDB.SASA.ShrakeRupley is bundled with biopython 1.79+ and
          # avoids the freesasa Python API churn (Calc→Calculator across
          # versions). Computes Shrake-Rupley SASA in place; we then sum.
          ShrakeRupley(probe_radius=1.40, n_points=100).compute(struct, level="R")
          residue_sasas = [r.sasa for r in struct.get_residues() if hasattr(r, 'sasa')]
          if residue_sasas:
              mean_sasa = sum(residue_sasas) / len(residue_sasas)
      except Exception as e:
          print(f"[epilogue] SASA failed for {os.path.basename(cif)}: {type(e).__name__}: {e}", file=sys.stderr)
      # Free-thiol Cys: SG atoms whose nearest SG neighbour is > 2.5 Å (i.e.
      # not disulfide-bonded in the predicted structure). Site-specific ADC
      # conjugation chemistries (Thiomab/click) need free thiols.
      sg = [a.coord for a in atoms if a.get_parent().resname == 'CYS' and a.id == 'SG']
      import numpy as np
      free_thiols = 0
      for i, c in enumerate(sg):
          if not any(abs(j-i)>0 and ((sg[j]-c)**2).sum()**0.5 < 2.5 for j in range(len(sg))):
              free_thiols += 1
      return {'mean_sasa': mean_sasa, 'free_thiols': free_thiols, 'n_atoms': len(atoms),
              'n_cys': len(sg)}

  out_rows = []
  for entry in meta['ranked']:
      acc = entry['acc']
      tier = 'A' if entry['tier_A'] > 0 else 'C'
      uni = fetch_uniprot(acc)
      gene = uni.get('gene','')
      surface = is_surface(uni)
      pred_dir = os.path.join(output_dir, 'predictions')
      cifs = glob.glob(os.path.join(pred_dir, '**', f'*{acc}*.cif'), recursive=True)
      sfeat = structure_features(cifs[0]) if cifs else None
      seq = fasta_seq.get(acc, '')
      nxs = nxs_t_density(seq)
      lfc = lfc_lookup(acc, gene)

      # Score components (each in [0,1] after normalisation).
      # mean_sasa is per-residue (Å²); 0-50 buried, 50-150 partial, 150+ surface.
      norm_sasa  = min(1.0, (sfeat['mean_sasa'] / 120.0) if sfeat else 0.0)
      norm_lfc   = min(1.0, max(0.0, lfc / 3.0))    # LFC>=3 maxes out
      norm_thiol = min(1.0, (sfeat['free_thiols'] / 4.0) if sfeat else 0.0)
      norm_nxs   = max(0.0, 1.0 - (nxs / 10.0))     # 10+ N-sites → 0; PENALTY
      norm_tier  = 1.0 if tier == 'A' else 0.0

      # Hard gate: not surface-accessible → score 0, flag NOT_SURFACE.
      if surface is False:
          score, flag, reason = 0.0, 'NO', 'not surface-accessible'
      elif surface is None:
          score = (0.30*norm_sasa + 0.20*norm_lfc + 0.20*norm_thiol
                   + 0.15*norm_nxs + 0.15*norm_tier)
          flag = 'YES' if score >= drug_t else 'NO'
          reason = 'subcellular location unknown'
      else:
          score = (0.30*norm_sasa + 0.25*norm_lfc + 0.20*norm_thiol
                   + 0.15*norm_nxs + 0.10*norm_tier)
          flag = 'YES' if score >= drug_t else 'NO'
          reason = ''

      out_rows.append({
          'acc': acc, 'gene': gene, 'tier': tier,
          'surface': surface, 'subloc': '; '.join(uni.get('subloc', []))[:120],
          'signal_peptide': uni.get('signal_peptide', None),
          'tm_count': uni.get('tm_count', 0),
          'mean_sasa': round(sfeat['mean_sasa'], 2) if sfeat else None,
          'free_thiols': sfeat['free_thiols'] if sfeat else None,
          'n_cys': sfeat['n_cys'] if sfeat else None,
          'nxs_sites': nxs,
          'tcga_brca_lfc': lfc,
          'druggability_score': round(score, 3),
          'adc_tractable': flag,
          'reason': reason,
          'glycan': entry.get('glycan',''),
          'n_oxonium': oxon_total,
      })

  # Sort by score descending so the TSV ranks ADC candidates top-down
  out_rows.sort(key=lambda r: -r['druggability_score'])

  with open(UNIPROT_CACHE, 'w') as fh:
      json.dump(uniprot_cache, fh)

  json.dump({'ranked': out_rows, 'threshold': drug_t},
            open(os.path.join(output_dir, 'druggability.json'),'w'), indent=2)

  cols = ['acc','gene','tier','surface','signal_peptide','tm_count',
          'mean_sasa','free_thiols','n_cys','nxs_sites','tcga_brca_lfc',
          'druggability_score','adc_tractable','reason','glycan','n_oxonium',
          'subloc']
  with open(os.path.join(output_dir, 'summary.tsv'), 'w') as fh:
      fh.write('\t'.join(cols) + '\n')
      for r in out_rows:
          fh.write('\t'.join(str(r.get(c,'')) for c in cols) + '\n')
  n_tractable = sum(1 for r in out_rows if r['adc_tractable'] == 'YES')
  print(f'[fold] {len(out_rows)} rows in summary.tsv, {n_tractable} ADC-tractable (>= {drug_t})')
  PYEOF

  apptainer exec --bind /mnt/efs "$PYTHON_SIF" \
    "$VENV_DIR/bin/python" "$OUTPUT_DIR/epilogue.py" \
      "$OUTPUT_DIR" "${QC_DIR:-}" "$DRUG_T" "$FASTA" "$PSM_N_DIR" "$PSM_O_DIR"
