id: cryodrgn
name: cryoDRGN (continuous heterogeneity)
description: |
  Continuous conformational heterogeneity analysis for cryo-EM via a deep
  generative model (cryoDRGN, ml-struct-bio). Solves the class of problems
  RELION 3D-classification + cryoSPARC heterogeneous refinement can't —
  continuous conformational landscapes instead of discrete classes. GPU
  mandatory (PyTorch). Adjacent to the cryo-EM canon called out in
  wedge report § 11.5.
vertical: hcls
category: cryo-em
workload_group: cryo-em
modality: form
tools: [cryoDRGN]
ready: true
kind: batch

runtime:
  kind: venv
  python_version: "3.10"
  base_image: python:3.11
  requirements: ["cryodrgn==3.4.0"]
  cache_dir: /mnt/efs/_cryodrgn-venv/3.4.0
  entrypoint: cryodrgn
  notes: |
    No upstream cryoDRGN container exists on Docker Hub / Quay / GHCR
    (verified May 11 2026). Pip install into a persistent EFS site-packages
    cache. CUDA torch wheels pulled by the cryodrgn dep tree so
    `--cuda` works when /dev/nvidia* is bound via apptainer --nv.

sbatch: |
  #SBATCH --partition=gpu
  #SBATCH --cpus-per-task=8
  #SBATCH --mem=32G
  #SBATCH --time=4:00:00
  #SBATCH --nodes=1
  #SBATCH --gres=gpu:a10g:1
inputs:
  - key: particles_mrcs
    role: generic_path
    required: false
    default: ""
    description: |
      Stack of preprocessed cryo-EM particle images (.mrcs). Empty =
      SMOKE_MODE (cryodrgn --help only).
  - key: poses_pkl
    role: generic_path
    required: false
    default: ""
    description: Particle poses pickle (from cryodrgn parse_pose_star).
  - key: ctf_pkl
    role: generic_path
    required: false
    default: ""
    description: Particle CTF parameters pickle (from cryodrgn parse_ctf_star).

parameters:
  - key: zdim
    label: Latent dimensions
    widget: number
    default: 8
    min: 1
    max: 32
  - key: num_epochs
    label: Training epochs
    widget: number
    default: 20
    min: 1
    max: 200
  - key: batch_size
    label: Batch size
    widget: number
    default: 8
    min: 1
    max: 64

outputs:
  dir: "/mnt/efs/{{.ctx.user_email}}/cryodrgn-{{.ctx.run_id}}"
  artifacts:
    - key: weights
      path: "{{.outputs.dir}}/weights.pkl"
      role: primary_output
      description: Trained cryoDRGN model weights.

script: |
  #!/bin/bash
  set -euo pipefail
  OUTPUT_DIR={{.outputs.dir | quote}}
  mkdir -p "$OUTPUT_DIR"

  CRYODRGN_VENV={{.runtime.cache_dir | quote}}
  mkdir -p "$CRYODRGN_VENV"
  export PYTHONUSERBASE="$CRYODRGN_VENV"

  if [ "${CRYODRGN_SMOKE:-1}" = "1" ] || [ -z {{.inputs.particles_mrcs | quote}} ]; then
    echo "[cryodrgn] SMOKE_MODE: cryodrgn --help (set CRYODRGN_SMOKE=0 + provide particles_mrcs for real training)"
    RUNNER="$TMPDIR/cryodrgn-runner.sh"
    cat > "$RUNNER" <<'RUN'
  #!/bin/bash
  set -euo pipefail
  export PATH="$HOME/.local/bin:$PYTHONUSERBASE/bin:$PATH"
  if ! python -c "import cryodrgn" 2>/dev/null; then
    pip install --user --no-cache-dir --quiet cryodrgn==3.4.0
  fi
  exec cryodrgn --help
  RUN
    chmod +x "$RUNNER"
    exec apptainer exec --nv --bind "$TMPDIR:$TMPDIR" --bind /mnt/efs \
      --env "PYTHONUSERBASE=$PYTHONUSERBASE" \
      "docker://{{.runtime.base_image}}" bash "$RUNNER"
  fi

  PARTS={{.inputs.particles_mrcs | quote}}
  POSES={{.inputs.poses_pkl | quote}}
  CTF={{.inputs.ctf_pkl | quote}}
  [ -f "$PARTS" ] || { echo "particles_mrcs not readable: $PARTS" >&2; exit 1; }
  [ -f "$POSES" ] || { echo "poses_pkl not readable: $POSES" >&2; exit 1; }
  [ -f "$CTF" ]   || { echo "ctf_pkl not readable: $CTF" >&2; exit 1; }

  RUNNER="$TMPDIR/cryodrgn-runner.sh"
  cat > "$RUNNER" <<RUN
  #!/bin/bash
  set -euo pipefail
  export PATH="$HOME/.local/bin:$PYTHONUSERBASE/bin:$PATH"
  if ! python -c "import cryodrgn" 2>/dev/null; then
    pip install --user --no-cache-dir --quiet cryodrgn==3.4.0
  fi
  exec cryodrgn train_vae "$PARTS" \\
    --poses "$POSES" --ctf "$CTF" \\
    --zdim {{.params.zdim}} \\
    --num-epochs {{.params.num_epochs}} \\
    --batch-size {{.params.batch_size}} \\
    -o "$OUTPUT_DIR"
  RUN
  chmod +x "$RUNNER"
  exec apptainer exec --nv --bind "$TMPDIR:$TMPDIR" --bind /mnt/efs \
    --env "PYTHONUSERBASE=$PYTHONUSERBASE" \
    "docker://{{.runtime.base_image}}" bash "$RUNNER"
