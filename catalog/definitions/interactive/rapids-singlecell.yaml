id: rapids-singlecell
name: rapids-singlecell (GPU scanpy)
description: GPU-accelerated scanpy drop-in via JupyterLab. Same scanpy API, RAPIDS underneath — 16-250x speedup on scRNA-seq pipelines.
vertical: hcls
category: interactive
workload_group: single-cell
modality: notebook
tools: [rapids-singlecell, scanpy, JupyterLab, RAPIDS]
ready: true
kind: interactive

runtime:
  kind: interactive_image
  image: nvcr.io/nvidia/rapidsai/notebooks:25.10-cuda12.9-py3.11
  notes: |
    NGC public RAPIDS notebooks image — ships rapids + scanpy + JupyterLab.
    Anonymous pull; if NGC ever auth-gates a tag, set
    APPTAINER_DOCKER_USERNAME/PASSWORD via /etc/clusterra/ghcr.

sbatch: |
  #SBATCH --partition=gpu
  #SBATCH --cpus-per-task=4
  #SBATCH --mem=24G
  #SBATCH --time=8:00:00
  #SBATCH --nodes=1
  #SBATCH --gres=gpu:a10g:1
inputs: []

parameters:
  - key: profile
    widget: enum
    options: [gpu-a10]
    default: gpu-a10
    description: rapids-singlecell requires a CUDA GPU; only gpu-a10 is offered.
  - key: port
    widget: number
    default: 0
    advanced: true

routing:
  path_prefix: /jupyter
  port_param: port
  ready_callback: true

script: |
  #!/bin/bash
  set -euo pipefail

  PORT=$(shuf -i 10000-60000 -n 1)
  NODE_IP=$(hostname -I | awk '{print $1}')

  AUTH=""
  if [ -n "${CLUSTERRA_INTERNAL_TOKEN:-}" ]; then
    AUTH="-H Authorization: Bearer ${CLUSTERRA_INTERNAL_TOKEN}"
  fi
  curl -sf -X POST ${AUTH} \
    -H "Content-Type: application/json" \
    -d "{\"node_ip\":\"${NODE_IP}\",\"port\":${PORT},\"cluster_id\":\"{{.ctx.cluster_id}}\",\"user_email\":\"{{.ctx.user_email}}\",\"template_id\":\"rapids-singlecell\"}" \
    "${CLUSTERRA_API}/v1/internal/sessions/${SLURM_JOB_ID}/ready" \
    || echo "ready callback failed (continuing; proxy will 502 until retry)" >&2

  WORKDIR=/mnt/efs/{{.ctx.user_email}}
  mkdir -p "$WORKDIR"

  STARTER="$WORKDIR/rapids-singlecell-pbmc3k.ipynb"
  if [ ! -f "$STARTER" ]; then
    cat > "$STARTER" <<'NB'
  {
   "cells": [
    {"cell_type": "markdown", "metadata": {}, "source": [
      "# rapids-singlecell smoke test — pbmc3k\n",
      "Drop-in scanpy API, GPU underneath."]},
    {"cell_type": "code", "metadata": {}, "execution_count": null, "outputs": [], "source": [
      "import scanpy as sc\n",
      "import rapids_singlecell as rsc\n",
      "adata = sc.datasets.pbmc3k()\n",
      "rsc.get.anndata_to_GPU(adata)\n",
      "rsc.pp.normalize_total(adata, target_sum=1e4)\n",
      "rsc.pp.log1p(adata)\n",
      "rsc.tl.pca(adata, n_comps=50)\n",
      "rsc.pp.neighbors(adata, n_neighbors=15)\n",
      "rsc.tl.umap(adata)\n",
      "rsc.tl.leiden(adata)\n",
      "sc.pl.umap(adata, color='leiden')"]}
   ],
   "metadata": {"kernelspec": {"display_name": "Python 3", "language": "python", "name": "python3"}},
   "nbformat": 4, "nbformat_minor": 5
  }
  NB
  fi

  CACHE_DIR=/var/lib/apptainer/sif-cache
  mkdir -p "$CACHE_DIR"
  TAG_HASH=$(printf '%s' "{{.runtime.image}}" | sha256sum | cut -c1-12)
  SIF="$CACHE_DIR/rapids-singlecell-$TAG_HASH.sif"
  (
    flock -x 200
    if [ ! -f "$SIF" ]; then
      apptainer pull --force "$SIF" docker://{{.runtime.image}}
    fi
  ) 200>"$CACHE_DIR/.lock-$TAG_HASH"

  exec apptainer exec \
    --nv \
    --bind /mnt/efs:/mnt/efs \
    "$SIF" \
    jupyter lab \
      --ip=0.0.0.0 --port=${PORT} \
      --ServerApp.base_url=/jupyter/{{.ctx.cluster_id}}/${SLURM_JOB_ID}/ \
      --ServerApp.token='' \
      --ServerApp.password='' \
      --ServerApp.password_required=False \
      --ServerApp.allow_origin='*' \
      --ServerApp.allow_origin_pat='.*' \
      --ServerApp.allow_remote_access=True \
      --ServerApp.trust_xheaders=True \
      --ServerApp.disable_check_xsrf=True \
      --ServerApp.root_dir=/mnt/efs/{{.ctx.user_email}} \
      --IdentityProvider.token='' \
      --no-browser
