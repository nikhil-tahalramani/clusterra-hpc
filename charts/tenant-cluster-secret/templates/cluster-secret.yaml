{{- /*
ExternalSecret that materializes the ArgoCD cluster Secret for one tenant.

Source: central-account SM `clusterra/cluster/{clusterId}/kubeconfig` already
written by provisioner phase 5 ([05-finalize.sh:79-103]) in the canonical
{server, token, ca_data} shape — maps 1:1 into ArgoCD's expected cluster
Secret format with no transform.

Wave 4 so the workloads Application (wave 5) can reference the cluster
Secret by name.
*/}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tenant-{{ .Values.clusterId }}
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: tenant-{{ .Values.clusterId }}
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: cluster
      data:
        name: tenant-{{ .Values.clusterId }}
        server: '{{ `{{ .server }}` }}'
        config: |
          {
            "bearerToken": "{{ `{{ .token }}` }}",
            "tlsClientConfig": { "caData": "{{ `{{ .ca_data }}` }}" }
          }
  dataFrom:
    - extract:
        key: clusterra/cluster/{{ .Values.clusterId }}/kubeconfig
